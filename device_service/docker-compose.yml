services:
  device-db:
    image: postgres:16
    env_file:
      - .env
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - shared-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 3s
      timeout: 2s
      retries: 10

  device-service:
    build: .
    ports:
      - "8081:8081"
    depends_on:
      device-db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${POSTGRES_PORT}/${POSTGRES_DB}
    networks:
      - shared-network
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.device-service.rule=Host(`device.localhost`)"
      - "traefik.http.routers.device-service.entrypoints=web"

volumes:
  pgdata:

networks:
  shared-network:
    external: true
