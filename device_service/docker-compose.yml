services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Password123
      POSTGRES_DB: devices
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  device-service:
    build: .
    ports:
      - "8081:8081"
    depends_on:
      - db
    environment:
      DATABASE_URL: postgresql://postgres:Password123@db:5432/devices

volumes:
  pgdata: